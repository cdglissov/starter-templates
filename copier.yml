_min_copier_version: "9.15"
_templates_suffix: .jinja
_subdirectory: "{{ scaffold_type }}"

scaffold_type:
  type: str
  help: Template variant to use.
  choices:
    - python-project-template
  default: "python-project-template"

project_name:
  type: str
  help: Human-readable project name.
  default: "Python Project"

project_name:
  type: str
  help: Repository/package distribution name.
  default: >-
    {{ project_name|lower|replace(' ', '-')|regex_replace('[^a-z0-9_-]', '') }}

package_name:
  type: str
  help: Importable package name.
  default: "{{ project_name|replace('-', '_') }}"

project_description:
  type: str
  help: Short project description.
  default: "Hello World"

author_name:
  type: str
  help: Author name.
  default: "cdglissov"
  validator: >-
    {% if not (author_name | trim) %}
    Author name cannot be empty.
    {% endif %}

python_version:
  type: str
  help: Minimum Python version.
  choices: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  default: "3.12"
  when: "{{ scaffold_type == 'python-project-template' }}"
  validator: >-
    {% if not (python_version | trim) %}
    Python version cannot be empty.
    {% endif %}

copyright_year:
  type: int
  help: Copyright year used in the generated license.
  default: 2026
